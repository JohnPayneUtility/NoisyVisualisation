# @package _global_
# Run budget determined by 2x evaluations required by PCEA to find optimum
run:
  max_gens: 1e6
  eval_limit: 1e6
  target_stop: true
  no_improve_limit: 1e6
  use_noise_dependent_eval_limit: true
  eval_limit_for_noise:
    "0": 5054
    "1": 7448
    "2": 11704
    "3": 13034
    "4": 14630
    "5": 18620
    "6": 20748
    "7": 27132
    "8": 32452
    "9": 32452
    "10": 34846
  seed: 1
  num_runs: 30
  parallel: true
  override_max_workers: null
  progress_print_interval: 10000
  record_population: false
  # nvme_path: ${hydra:runtime.cwd}/fast_storage
