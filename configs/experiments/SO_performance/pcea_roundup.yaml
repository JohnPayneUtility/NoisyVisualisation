# @package _global_
# BASE SETTINGS
defaults:
  - /defaults/mlflow
  - _self_   # ensures overrides below take precedence

# OVERRIDES
# none

# EXPERIMENT SETTINGS
experiment_name: "pcea large kp"
# experiment_description: >
#   Performance of 1p1ea, UMDA, and PCEA on onemax and knapsack problems
#   for various noise models, eval budget is 2x evals required for PCEA to converge on onemax,
#   30 runs per combination of settings

hydra:
  mode: MULTIRUN
  sweeper: # sweep through various combinations of parameters
    params:
      +defaults/run: run_1m_evals
      +defaults/problems: kp100_uncor_v1, kp100_uncor_v2, kp100_uncor_1qbitwise, kp100_cor_v1, kp100_cor_v2, kp100_cor_1qbitwise
      +defaults/algos: pcea
      problem.fitness_params.noise_intensity: 0,1,2,3
  sweep:
    dir: data/outputs
