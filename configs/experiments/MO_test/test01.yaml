# @package _global_
# BASE SETTINGS
defaults:
  - /defaults/mlflow
  - _self_   # ensures overrides below take precedence

# EXPERIMENT SETTINGS
experiment_name: "MO_test01"
experiment_description: >
  

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      +defaults/multiobjective/run: run_mo_test
      +defaults/multiobjective/problems: kp10_mo_v1,kp10_mo_violation
      +defaults/multiobjective/algos: semo,moumda
      problem.fitness_params.noise_intensity: 0,1,2
  sweep:
    dir: data/outputs
